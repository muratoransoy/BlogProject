# -- Theme Params (Blowfish) --
# Override only what differs from theme defaults.
# Full reference: https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "fire"            # warmer, more distinctive than the default slate
defaultAppearance = "dark"
autoSwitchAppearance = true     # respect system preference

enableA11y = true               # accessibility helpers
enableSearch = true
enableCodeCopy = true           # copy button on code blocks
enableStructuredBreadcrumbs = true

replyByEmail = false

disableImageOptimization = false
disableTextInHeader = false

fingerprintAlgorithm = "sha512"

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"
  showRecent = true
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true

[article]
  showDate = true
  showAuthor = true
  showHero = false
  showBreadcrumbs = true
  showDraftLabel = true
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showCategories = true
  showTags = true
  showWordCount = true
  sharingLinks = ["linkedin", "twitter", "reddit", "email"]
  showComments = true              # giscus via layouts/partials/comments.html

[list]
  showHero = false
  showBreadcrumbs = true
  showSummary = true
  showTableOfContents = false
  showCards = false
  groupByYear = true

[taxonomy]
  showTermCount = true

[term]
  showHero = false
  groupByYear = false
